# ~/.config/alacritty/alacritty.toml
[window]
padding = { x = 3, y = 3 }
dynamic_padding = true
opacity = 0.9
decorations = "none"


[font]
normal = { family = "Menlo", style = "Regular" }
bold = { family = "Menlo", style = "Bold" }
italic = { family = "Menlo", style = "Italic" }
bold_italic = { family = "Menlo", style = "Bold Italic" }
size = 12.0

[scrolling]
history = 10000
multiplier = 3

[colors]
[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

